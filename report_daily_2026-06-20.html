    function ensureChart() {
      if (chart) return;
      const el = document.getElementById("chart");

        layout: { background: { color: palette.bg }, textColor: palette.text },
        grid: { vertLines: { color: palette.grid }, horzLines: { color: palette.grid } },

    function render(ticker) {
      const c = DATA[ticker];
      if (!c) return;
      ensureChart();
      candleSeries.setData(c.chart.candles);
      volSeries.setData(c.chart.volume.map((b) => ({

      })));

      // Annotations: range band (support/resistance) + spring/upthrust marker.
      // Clear the previous ticker's lines first — setData doesn't remove price lines.
      priceLines.forEach((pl) => candleSeries.removePriceLine(pl));
      priceLines = [];
      if (c.chart.range_high != null)
        priceLines.push(candleSeries.createPriceLine({ price: c.chart.range_high, color: palette.range, lineStyle: 2, title: "range high" }));
      if (c.chart.range_low != null)
        priceLines.push(candleSeries.createPriceLine({ price: c.chart.range_low, color: palette.range, lineStyle: 2, title: "range low" }));
      if (c.chart.marker) {
        const m = c.chart.marker;
        candleSeries.setMarkers([{
          time: m.time, position: m.type === "spring" ? "belowBar" : "aboveBar",
          color: palette.marker, shape: m.type === "spring" ? "arrowUp" : "arrowDown",
          text: m.type === "spring" ? "Spring" : "Upthrust",
        }]);
      } else {
        candleSeries.setMarkers([]);
      }

      document.getElementById("p-score").textContent = c.score.toFixed(0) + "/100";
