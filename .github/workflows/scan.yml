# Scheduled Wyckoff scan (SPEC §9). Runs unattended; publishes results to the
# gh-pages branch (served by GitHub Pages) so `main` stays code-only.
# GitHub cron is UTC and not guaranteed to the minute.
name: scan

on:
  workflow_dispatch:
    inputs:
      timeframe:
        description: "Timeframe to scan (daily or weekly)"
        required: true
        default: daily
  schedule:
    - cron: "0 22 * * 1-5"   # Daily: ~22:00 UTC weekdays, after US close
    - cron: "0 14 * * 6"     # Weekly: Saturday, after Friday close settles

permissions:
  contents: write            # publish to the gh-pages branch

concurrency:                 # never let two scans race on the published output
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick timeframe (dispatch input, else which cron fired)
        id: tf
        run: |
          if [ -n "${{ github.event.inputs.timeframe }}" ]; then
            echo "value=${{ github.event.inputs.timeframe }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 6" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore persistent state from gh-pages
        run: |
          mkdir -p output
          git fetch origin gh-pages --depth=1 || true
          # signals.csv accumulates; state.json drives dedup/MTF — carry them forward.
          git show origin/gh-pages:signals.csv > output/signals.csv 2>/dev/null || true
          git show origin/gh-pages:state.json  > output/state.json  2>/dev/null || true

      - name: Run scanner
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          REPORT_BASE_URL: https://likelythatalex.github.io/trade-sniffer
        run: python -m src.scanner --timeframe ${{ steps.tf.outputs.value }}

      - name: Publish output to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true   # keep prior dated reports + the other timeframe's files
