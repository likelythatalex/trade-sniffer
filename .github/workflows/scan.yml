# Scheduled Wyckoff scan (SPEC §9). Runs unattended, commits results back to the repo.
# GitHub cron is UTC and not guaranteed to the minute.
name: scan

on:
  workflow_dispatch:
    inputs:
      timeframe:
        description: "Timeframe to scan (daily or weekly)"
        required: true
        default: daily
  schedule:
    - cron: "0 22 * * 1-5"   # Daily: ~22:00 UTC weekdays, after US close
    - cron: "0 14 * * 6"     # Weekly: Saturday, after Friday close settles

permissions:
  contents: write            # commit output/ back to the repo

concurrency:                 # never let two scans race on the committed output
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick timeframe (dispatch input, else which cron fired)
        id: tf
        run: |
          if [ -n "${{ github.event.inputs.timeframe }}" ]; then
            echo "value=${{ github.event.inputs.timeframe }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 6" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ secrets.REPORT_BASE_URL }}
        run: python -m src.scanner --timeframe ${{ steps.tf.outputs.value }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # latest_<tf>.html + watchlist are gitignored locally, so force-add them.
          # Dated report_<tf>_<date>.html is intentionally NOT committed (repo bloat;
          # regenerable; use GitHub Pages if you want dated history hosted).
          git add -f output/latest_*.html output/watchlist_*.txt output/signals.csv output/state.json
          git diff --quiet --cached || git commit -m "scan: ${{ steps.tf.outputs.value }} $(date -u +%F)"
          git push
